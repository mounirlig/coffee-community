<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coffee Community</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div class="brand-block">
          <div class="coffee-logo" aria-hidden="true">
            <svg viewBox="0 0 96 96" role="img">
              <g class="steam">
                <path class="steam-line steam-line-one" d="M35 30 C28 20 43 16 36 6" />
                <path class="steam-line steam-line-two" d="M50 31 C42 19 58 17 51 7" />
                <path class="steam-line steam-line-three" d="M65 30 C58 21 72 17 66 8" />
              </g>
              <path class="cup" d="M24 41 H64 V59 C64 70 56 77 44 77 H42 C31 77 24 70 24 59 Z" />
              <path class="handle" d="M64 47 H70 C77 47 81 51 81 57 C81 64 76 68 68 68 H62" />
              <path class="saucer" d="M20 80 C27 85 61 85 70 80" />
            </svg>
          </div>
          <div>
            <p class="eyebrow">Coffee Community</p>
            <h1>Suivi des contributions Caféière</h1>
            <p class="sync-status" id="syncStatus">Stockage local</p>
          </div>
        </div>
      </header>

      <section class="account-grid" aria-label="Equipe">
        <div class="panel" id="teamPanel">
          <div class="panel-heading">
            <h2>Équipe</h2>
          </div>
          <div class="stack-form">
            <label>
              Équipe active
              <select id="teamSelect"></select>
            </label>
            <form class="inline-form" id="teamForm">
              <label>
                Nouvelle équipe
                <input id="teamName" type="text" placeholder="Ex. Produit" autocomplete="off" required />
              </label>
              <button type="submit">Créer</button>
            </form>
            <form class="inline-form" id="joinTeamForm">
              <label>
                Code équipe
                <input id="teamCode" type="text" placeholder="Ex. a1b2c3d4" autocomplete="off" required />
              </label>
              <button type="submit">Rejoindre</button>
            </form>
            <p class="helper-text" id="teamMessage">Crée une équipe ou rejoins-en une avec un code.</p>
          </div>
        </div>
      </section>

      <section class="summary-grid" aria-label="Résumé">
        <article class="summary-card">
          <span>Total collecté</span>
          <strong id="totalContributions">0,00 EUR</strong>
        </article>
        <article class="summary-card">
          <span>Achats dosettes</span>
          <strong id="totalPurchases">0,00 EUR</strong>
        </article>
        <article class="summary-card">
          <span>Solde caisse</span>
          <strong id="cashBalance">0,00 EUR</strong>
        </article>
        <article class="summary-card">
          <span>Membres</span>
          <strong id="memberCount">0</strong>
        </article>
      </section>

      <section class="workspace">
        <div class="panel">
          <div class="panel-heading">
            <h2>Membres</h2>
          </div>
          <form class="inline-form" id="memberForm">
            <label>
              Nom
              <input id="memberName" type="text" placeholder="Ex. Sarah" autocomplete="off" required />
            </label>
            <button type="submit">Ajouter</button>
          </form>
          <div class="member-list" id="memberList"></div>
        </div>

        <div class="panel">
          <div class="panel-heading">
            <h2>Nouvelle contribution</h2>
          </div>
          <form class="stack-form" id="contributionForm">
            <label>
              Membre
              <select id="contributionMember" required></select>
            </label>
            <div class="form-row">
              <label>
                Montant
                <input id="contributionAmount" type="text" inputmode="decimal" placeholder="5,00" required />
              </label>
              <label>
                Date
                <input id="contributionDate" type="date" required />
              </label>
            </div>
            <label>
              Note
              <input id="contributionNote" type="text" placeholder="Ex. participation mensuelle" />
            </label>
            <button type="submit">Enregistrer la contribution</button>
          </form>
        </div>

        <div class="panel">
          <div class="panel-heading">
            <h2>Achat de dosettes</h2>
          </div>
          <form class="stack-form" id="purchaseForm">
            <div class="form-row">
              <label>
                Montant
                <input id="purchaseAmount" type="text" inputmode="decimal" placeholder="24,90" required />
              </label>
              <label>
                Date
                <input id="purchaseDate" type="date" required />
              </label>
            </div>
            <div class="form-row">
              <label>
                Dosettes
                <input id="purchasePods" type="text" inputmode="numeric" placeholder="100" required />
              </label>
              <label>
                Acheté par
                <select id="purchaseBuyer" required></select>
              </label>
            </div>
            <label>
              Note
              <input id="purchaseNote" type="text" placeholder="Ex. boite mix espresso" />
            </label>
            <button type="submit">Enregistrer l'achat</button>
          </form>
        </div>
      </section>

      <section class="panel ledger-panel">
        <div class="panel-heading">
          <h2>Historique</h2>
          <div class="tabs" role="tablist" aria-label="Filtre historique">
            <button class="tab is-active" type="button" data-filter="all">Tout</button>
            <button class="tab" type="button" data-filter="contribution">Contributions</button>
            <button class="tab" type="button" data-filter="purchase">Achats</button>
          </div>
        </div>
        <div class="ledger" id="ledger"></div>
      </section>

      <footer class="data-actions" aria-label="Import et export des données">
        <button class="ghost-button" id="exportData" type="button" title="Exporter les données">
          Exporter
        </button>
        <label class="ghost-button file-button" title="Importer des données">
          Importer
          <input id="importData" type="file" accept="application/json" />
        </label>
      </footer>
    </main>

    <template id="emptyStateTemplate">
      <div class="empty-state">
        <strong>Aucune donnée pour l'instant.</strong>
        <span>Ajoute quelques membres puis enregistre les contributions et les achats de café.</span>
      </div>
    </template>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./supabase-config.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
