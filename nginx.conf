server {
  listen 8080;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  add_header X-Content-Type-Options "nosniff" always;

  location = /healthz {
    access_log off;
    add_header Content-Type text/plain;
    return 200 "ok\n";
  }

  location = /app.js {
    add_header Cache-Control "public, max-age=0, must-revalidate" always;
    try_files $uri =404;
  }

  location = /styles.css {
    add_header Cache-Control "public, max-age=0, must-revalidate" always;
    try_files $uri =404;
  }

  location = /supabase-config.js {
    add_header Cache-Control "public, max-age=0, must-revalidate" always;
    try_files $uri =404;
  }

  location = /backend-config.js {
    add_header Cache-Control "public, max-age=0, must-revalidate" always;
    try_files $uri =404;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
